<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glo Spa Beauty Salon – Our Services</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #F5EDE4;
    --tan: #B8A07E;
    --tan-light: #C9B896;
    --tan-dark: #8C7A5E;
    --text-dark: #3A3028;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    margin: 0;
    padding: 0;
  }

  /* ── SECTION ── */
  .services-section {
    width: 100%;
    padding: 80px 5% 90px;
    background: var(--cream);
    text-align: center;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(2.8rem, 5.5vw, 4.5rem);
    color: var(--tan);
    margin-bottom: 3.5rem;
    letter-spacing: 0.02em;
  }

  /* ── CARDS ROW ── */
  .cards-row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 3%;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ── SINGLE CARD ── */
  .service-card {
    flex: 1;
    max-width: 320px;
    text-align: center;
    text-decoration: none;
    display: block;
    cursor: pointer;
  }

  /* ── IMAGE SHAPES ── */
  .card-img-wrap {
    position: relative;
    width: 100%;
    overflow: hidden;
    margin-bottom: 1.6rem;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.7s cubic-bezier(0.25, 0, 0.25, 1);
  }

  .service-card:hover .card-img-wrap img {
    transform: scale(1.06);
  }

  /* All cards — same arch shape */
  .card-img-wrap {
    aspect-ratio: 3 / 4;
    border-radius: 160px 160px 0 0;
  }

  /* ── CARD TEXT ── */
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(1.4rem, 2.2vw, 1.9rem);
    color: var(--text-dark);
    display: block;
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }

  /* ── SHOW SERVICES BUTTON ── */
  .card-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-decoration: none;
    color: #fff;
    background: #8B1A1A;
    border: 1.5px solid #8B1A1A;
    border-radius: 50px;
    padding: 0.7rem 2rem;
    display: inline-block;
    transition: all 0.35s ease;
  }

  .service-card:hover .card-btn {
    background: #6B1010;
    border-color: #6B1010;
    color: #fff;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .cards-row {
      flex-wrap: wrap;
      gap: 2rem;
    }
    .service-card {
      flex: 0 0 45%;
      max-width: 300px;
    }
  }

  @media (max-width: 560px) {
    .cards-row {
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }
    .service-card {
      flex: none;
      width: 75%;
      max-width: 280px;
    }
    .services-section {
      padding: 60px 5% 60px;
    }
  }
</style>
</head>
<body>

<section class="services-section">

  <h2 class="section-title">Our Services</h2>

  <div class="cards-row">

    <!-- Nails — arch shape -->
    <a href="http://glospabeautysalon.com/services/#manicures" class="service-card shape-arch">
      <div class="card-img-wrap">
        <img src="http://glospabeautysalon.com/wp-content/uploads/2026/04/att.uyLhRJoFfev0IaweXm3CvE9b_PuCOclOw4Tkprp-7cY.jpeg" alt="Nails">
      </div>
      <span class="card-name">Nails</span>
      <span class="card-btn">Show Services</span>
    </a>

    <!-- Lashes — tall arch shape -->
    <a href="http://glospabeautysalon.com/services/#lashes-brows" class="service-card shape-tall-arch">
      <div class="card-img-wrap">
        <img src="http://glospabeautysalon.com/wp-content/uploads/2026/04/benefits-of-being-a-lash-technician-applying-lashes.webp" alt="Lashes">
      </div>
      <span class="card-name">Lashes</span>
      <span class="card-btn">Show Services</span>
    </a>

    <!-- Facial — circle shape -->
    <a href="http://glospabeautysalon.com/services/#facials" class="service-card shape-circle">
      <div class="card-img-wrap">
        <img src="http://glospabeautysalon.com/wp-content/uploads/2026/04/types-of-facial-florida-academy-scaled-1.jpg" alt="Facial">
      </div>
      <span class="card-name">Facial</span>
      <span class="card-btn">Show Services</span>
    </a>

    <!-- Waxing — soft arch shape -->
    <a href="http://glospabeautysalon.com/services/#waxing" class="service-card shape-soft-arch">
      <div class="card-img-wrap">
        <img src="http://glospabeautysalon.com/wp-content/uploads/2026/04/Waxing-by-Royalty-Wellness-Spa-in-Memphis-TN-1024x617-1.webp" alt="Waxing">
      </div>
      <span class="card-name">Waxing</span>
      <span class="card-btn">Show Services</span>
    </a>

    <!-- Microblading -->
    <a href="http://glospabeautysalon.com/services/#permanent-makeup" class="service-card">
      <div class="card-img-wrap">
        <img src="http://glospabeautysalon.com/wp-content/uploads/2026/04/images-1.jpeg" alt="Microblading">
      </div>
      <span class="card-name">Microblading</span>
      <span class="card-btn">Show Services</span>
    </a>

  </div>

</section>

</body>
</html>
